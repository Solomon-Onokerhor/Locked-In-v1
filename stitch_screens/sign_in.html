<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Locked In Sign In Desktop</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4 overflow-hidden relative font-display text-slate-900 dark:text-slate-100">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] md:w-[800px] md:h-[800px] rounded-full bg-stone-500/10 dark:bg-stone-400/5 blur-[80px] md:blur-[120px] pointer-events-none"></div>
<div class="relative z-10 w-full max-w-[480px] bg-white/50 dark:bg-black/40 backdrop-blur-md border border-stone-200/50 dark:border-white/10 rounded-lg p-8 md:p-12 shadow-2xl flex flex-col items-center">
<div class="flex flex-col items-center gap-1 w-full mb-8">
<h1 class="text-3xl md:text-4xl font-bold tracking-tight text-slate-900 dark:text-white">Locked In.</h1>
<p class="text-[10px] md:text-xs font-bold tracking-[0.2em] text-stone-500 dark:text-stone-400 uppercase">Lock in. Level up.</p>
</div>
<div class="flex w-full border-b border-stone-200 dark:border-stone-800 mb-8">
<a class="flex-1 pb-3 text-center border-b-2 border-slate-900 dark:border-white text-sm font-bold text-slate-900 dark:text-white transition-colors" href="#">Sign In</a>
<a class="flex-1 pb-3 text-center border-b-2 border-transparent text-sm font-bold text-stone-400 dark:text-stone-500 hover:text-slate-900 dark:hover:text-stone-300 transition-colors" href="#">Sign Up</a>
</div>
<form class="w-full flex flex-col gap-5">
<label class="flex flex-col gap-2">
<span class="text-sm font-medium text-slate-700 dark:text-stone-300">Email</span>
<input class="w-full bg-stone-50 dark:bg-[#111] border border-stone-300 dark:border-stone-700/50 text-slate-900 dark:text-white rounded px-4 py-3.5 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-colors text-sm placeholder:text-stone-400 dark:placeholder:text-stone-600" placeholder="Enter your email" type="email"/>
</label>
<label class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<span class="text-sm font-medium text-slate-700 dark:text-stone-300">Password</span>
<a class="text-xs text-stone-500 dark:text-stone-400 hover:text-white dark:hover:text-white transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-stone-50 dark:bg-[#111] border border-stone-300 dark:border-stone-700/50 text-slate-900 dark:text-white rounded px-4 py-3.5 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-colors text-sm placeholder:text-stone-400 dark:placeholder:text-stone-600" placeholder="Enter your password" type="password"/>
</label>
<button class="w-full bg-white hover:bg-stone-200 text-black font-bold py-4 rounded transition-colors text-sm tracking-wide mt-2" type="button">
                Sign In
            </button>
</form>
<div class="flex items-center gap-4 w-full my-8">
<div class="flex-1 h-px bg-stone-200 dark:bg-stone-800"></div>
<span class="text-xs font-medium text-stone-400 dark:text-stone-500 uppercase tracking-widest">Or continue with</span>
<div class="flex-1 h-px bg-stone-200 dark:bg-stone-800"></div>
</div>
<button class="w-full flex items-center justify-center gap-3 border border-stone-300 dark:border-stone-700/50 bg-transparent hover:bg-stone-50 dark:hover:bg-stone-900/50 text-slate-900 dark:text-white font-medium py-3.5 rounded transition-colors text-sm" type="button">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Sign in with Google
        </button>
<p class="text-xs text-center text-stone-500 dark:text-stone-500 mt-8">
            By continuing, you agree to our <a class="underline hover:text-slate-900 dark:hover:text-white transition-colors" href="#">Terms of Service</a>
</p>
</div>

</body></html>
